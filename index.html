<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Proposals</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0f172a;
        color: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        display: flex;
        gap: 30px;
        background: #111827;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .card {
        width: 200px;
        text-align: center;
        padding: 20px;
        border-radius: 12px;
        background: #1f2933;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        background: #273449;
    }

    .number {
        font-size: 48px;
        color: #38bdf8;
        margin-bottom: 10px;
    }

    .text {
        font-size: 14px;
        color: #9ca3af;
        margin-bottom: 20px;
    }

    .btn {
        display: inline-block;
        padding: 10px 20px;
        background: #38bdf8;
        color: #0f172a;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        transition: 0.2s;
    }

    .btn:hover {
        background: #0ea5e9;
    }
</style>
</head>

<body>

<div class="container">
    
    <div class="card">
        <div class="number">1</div>
        <div class="text">This is just the app for ai generating with the features(demo)</div>
        <a class="btn" href="printai_prototype.html" target="_blank">OPEN</a>
    </div>

    <div class="card">
        <div class="number">2</div>
        <div class="text">This is the web app for the ai generation but works on all browsers</div>
        <a class="btn" href="threadai_web_prototype.html" target="_blank">OPEN</a>
    </div>

    <div class="card">
        <div class="number">3</div>
        <div class="text">this would be the full app with pairing to the machine , ai generation, accounts, pricing and all the features</div>
        <a class="btn" href="threadai_prototype.html" target="_blank">OPEN</a>
    </div>

</div>

</body>
</html>
