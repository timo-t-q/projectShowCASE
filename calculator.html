<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktívna kalkulačka</title>
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a63, #b21f1f, #1a2a63);
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .calculator-container {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
        }
        
        .calculator-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .calculator-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00c9ff, #92fe9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .calculator-header p {
            opacity: 0.7;
            font-size: 1rem;
        }
        
        .display {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            font-size: 2.5rem;
            text-align: right;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #f0f0f0;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .operator {
            background: linear-gradient(45deg, #00c9ff, #92fe9d);
            color: #0f172a;
            font-weight: 700;
        }
        
        .operator:hover {
            background: linear-gradient(45deg, #00b8ff, #82f08d);
        }
        
        .equals {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            font-weight: 700;
            grid-column: span 2;
        }
        
        .equals:hover {
            background: linear-gradient(45deg, #ff5252, #ffd93d);
        }
        
        .clear {
            background: rgba(255, 82, 82, 0.3);
            border: 1px solid rgba(255, 82, 82, 0.5);
            color: #ff5252;
        }
        
        .clear:hover {
            background: rgba(255, 82, 82, 0.4);
        }
        
        .zero {
            grid-column: span 2;
        }
        
        @media (max-width: 480px) {
            .calculator-container {
                padding: 20px;
            }
            
            .display {
                font-size: 2rem;
                padding: 15px;
            }
            
            .btn {
                padding: 15px;
                font-size: 1.1rem;
            }
            
            .calculator-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="calculator-header">
            <h1>Kalkulačka</h1>
            <p>Jednoduchá aritmetická kalkulačka</p>
        </div>
        
        <div class="display" id="display">0</div>
        
        <div class="buttons-grid">
            <button class="btn clear" onclick="clearDisplay()">C</button>
            <button class="btn" onclick="deleteLast()">⌫</button>
            <button class="btn" onclick="appendToDisplay('(')">(</button>
            <button class="btn" onclick="appendToDisplay(')')">)</button>
            
            <button class="btn" onclick="appendToDisplay('7')">7</button>
            <button class="btn" onclick="appendToDisplay('8')">8</button>
            <button class="btn" onclick="appendToDisplay('9')">9</button>
            <button class="btn operator" onclick="appendToDisplay('/')">÷</button>
            
            <button class="btn" onclick="appendToDisplay('4')">4</button>
            <button class="btn" onclick="appendToDisplay('5')">5</button>
            <button class="btn" onclick="appendToDisplay('6')">6</button>
            <button class="btn operator" onclick="appendToDisplay('*')">×</button>
            
            <button class="btn" onclick="appendToDisplay('1')">1</button>
            <button class="btn" onclick="appendToDisplay('2')">2</button>
            <button class="btn" onclick="appendToDisplay('3')">3</button>
            <button class="btn operator" onclick="appendToDisplay('-')">−</button>
            
            <button class="btn zero" onclick="appendToDisplay('0')">0</button>
            <button class="btn" onclick="appendToDisplay('.')">.</button>
            <button class="btn equals" onclick="calculateResult()">=</button>
            <button class="btn operator" onclick="appendToDisplay('+')">+</button>
        </div>
    </div>

    <script>
        let currentInput = '';
        let previousInput = '';
        let operator = null;
        let resetDisplay = false;
        
        const display = document.getElementById('display');
        
        function appendToDisplay(value) {
            if (resetDisplay) {
                currentInput = '';
                resetDisplay = false;
            }
            
            if (value === '.' && currentInput.includes('.')) return;
            
            currentInput += value;
            updateDisplay();
        }
        
        function chooseOperation(op) {
            if (currentInput === '') return;
            if (previousInput !== '') {
                calculateResult();
            }
            operator = op;
            previousInput = currentInput;
            currentInput = '';
        }
        
        function calculateResult() {
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            
            if (isNaN(prev) || isNaN(current)) return;
            
            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = prev / current;
                    break;
                default:
                    return;
            }
            
            currentInput = result.toString();
            operator = null;
            previousInput = '';
            resetDisplay = true;
            updateDisplay();
        }
        
        function clearDisplay() {
            currentInput = '';
            previousInput = '';
            operator = null;
            updateDisplay();
        }
        
        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            updateDisplay();
        }
        
        function updateDisplay() {
            if (currentInput === '') {
                display.textContent = '0';
            } else {
                // Limit display length to prevent overflow
                if (currentInput.length > 15) {
                    display.textContent = currentInput.slice(0, 15) + '...';
                } else {
                    display.textContent = currentInput;
                }
            }
        }
        
        // Keyboard support
        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') {
                appendToDisplay(e.key);
            } else if (e.key === '.') {
                appendToDisplay('.');
            } else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                chooseOperation(e.key);
                e.preventDefault();
            } else if (e.key === 'Enter' || e.key === '=') {
                calculateResult();
                e.preventDefault();
            } else if (e.key === 'Backspace') {
                deleteLast();
                e.preventDefault();
            } else if (e.key === 'Escape') {
                clearDisplay();
                e.preventDefault();
            }
        });
        
        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
