<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farbový menič pozadia</title>
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.5s ease;
            background: linear-gradient(135deg, #1a2a63, #b21f1f);
        }
        
        .color-changer-container {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 35px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .color-changer-header {
            margin-bottom: 30px;
        }
        
        .color-changer-header h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #00c9ff, #92fe9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .color-changer-header p {
            opacity: 0.7;
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .color-display {
            height: 180px;
            border-radius: 15px;
            margin: 25px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        
        .color-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
            pointer-events: none;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .color-values {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .color-value {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 12px 18px;
            min-width: 80px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .slider-container {
            margin: 25px 0;
        }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
            opacity: 0.9;
        }
        
        .slider-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .slider-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            border-radius: 4px;
            transition: width 0.1s ease;
        }
        
        .slider-input {
            width: 100%;
            height: 8px;
            opacity: 0;
            position: absolute;
            cursor: pointer;
        }
        
        .sliders {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .slider-item {
            position: relative;
        }
        
        .preset-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 25px;
        }
        
        .preset-btn {
            background: rgba(0, 201, 255, 0.2);
            border: 1px solid rgba(0, 201, 255, 0.3);
            color: #00c9ff;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .preset-btn:hover {
            background: rgba(0, 201, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 201, 255, 0.3);
        }
        
        .preset-btn.active {
            background: linear-gradient(45deg, #00c9ff, #92fe9d);
            color: #0f172a;
            box-shadow: 0 0 15px rgba(0, 201, 255, 0.5);
        }
        
        .random-btn {
            background: rgba(255, 82, 82, 0.2);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .random-btn:hover {
            background: rgba(255, 82, 82, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 82, 82, 0.3);
        }
        
        @media (max-width: 480px) {
            .color-changer-container {
                padding: 25px;
            }
            
            .color-changer-header h1 {
                font-size: 1.5rem;
            }
            
            .color-display {
                height: 150px;
            }
            
            .slider-label {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="color-changer-container">
        <div class="color-changer-header">
            <h1>Farbový menič</h1>
            <p>Interaktívna aplikácia na menenie farieb pomocou RGB posuvníkov</p>
        </div>
        
        <div class="color-display" id="colorDisplay">
            <div class="color-values">
                <div class="color-value" id="redValue">R: 255</div>
                <div class="color-value" id="greenValue">G: 100</div>
                <div class="color-value" id="blueValue">B: 150</div>
            </div>
        </div>
        
        <div class="sliders">
            <div class="slider-item">
                <div class="slider-label">
                    <span>Červená (Red)</span>
                    <span id="redSliderValue">255</span>
                </div>
                <div class="slider-track">
                    <div class="slider-fill" id="redFill"></div>
                </div>
                <input type="range" min="0" max="255" value="255" class="slider-input" id="redSlider">
            </div>
            
            <div class="slider-item">
                <div class="slider-label">
                    <span>Zelená (Green)</span>
                    <span id="greenSliderValue">100</span>
                </div>
                <div class="slider-track">
                    <div class="slider-fill" id="greenFill"></div>
                </div>
                <input type="range" min="0" max="255" value="100" class="slider-input" id="greenSlider">
            </div>
            
            <div class="slider-item">
                <div class="slider-label">
                    <span>Modrá (Blue)</span>
                    <span id="blueSliderValue">150</span>
                </div>
                <div class="slider-track">
                    <div class="slider-fill" id="blueFill"></div>
                </div>
                <input type="range" min="0" max="255" value="150" class="slider-input" id="blueSlider">
            </div>
        </div>
        
        <div class="preset-buttons">
            <button class="preset-btn" onclick="setPreset(255, 87, 51)">Coral</button>
            <button class="preset-btn" onclick="setPreset(52, 152, 219)">Blue</button>
            <button class="preset-btn" onclick="setPreset(46, 204, 113)">Green</button>
            <button class="preset-btn" onclick="setPreset(155, 89, 182)">Purple</button>
            <button class="preset-btn" onclick="setPreset(241, 196, 15)">Yellow</button>
            <button class="preset-btn" onclick="setPreset(255, 255, 255)">White</button>
        </div>
        
        <button class="random-btn" onclick="setRandomColor()">Náhodná farba</button>
    </div>

    <script>
        const colorDisplay = document.getElementById('colorDisplay');
        const redSlider = document.getElementById('redSlider');
        const greenSlider = document.getElementById('greenSlider');
        const blueSlider = document.getElementById('blueSlider');
        const redValue = document.getElementById('redValue');
        const greenValue = document.getElementById('greenValue');
        const blueValue = document.getElementById('blueValue');
        const redSliderValue = document.getElementById('redSliderValue');
        const greenSliderValue = document.getElementById('greenSliderValue');
        const blueSliderValue = document.getElementById('blueSliderValue');
        const redFill = document.getElementById('redFill');
        const greenFill = document.getElementById('greenFill');
        const blueFill = document.getElementById('blueFill');
        
        function updateColor() {
            const r = parseInt(redSlider.value);
            const g = parseInt(greenSlider.value);
            const b = parseInt(blueSlider.value);
            
            const rgb = `rgb(${r}, ${g}, ${b})`;
            colorDisplay.style.background = rgb;
            
            redValue.textContent = `R: ${r}`;
            greenValue.textContent = `G: ${g}`;
            blueValue.textContent = `B: ${b}`;
            
            redSliderValue.textContent = r;
            greenSliderValue.textContent = g;
            blueSliderValue.textContent = b;
            
            redFill.style.width = `${(r/255)*100}%`;
            greenFill.style.width = `${(g/255)*100}%`;
            blueFill.style.width = `${(b/255)*100}%`;
        }
        
        function setPreset(r, g, b) {
            redSlider.value = r;
            greenSlider.value = g;
            blueSlider.value = b;
            updateColor();
            
            // Update active button styling
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function setRandomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            
            redSlider.value = r;
            greenSlider.value = g;
            blueSlider.value = b;
            updateColor();
        }
        
        // Event listeners
        redSlider.addEventListener('input', updateColor);
        greenSlider.addEventListener('input', updateColor);
        blueSlider.addEventListener('input', updateColor);
        
        // Initialize
        updateColor();
    </script>
</body>
</html>
